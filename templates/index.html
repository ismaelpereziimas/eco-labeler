<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etiquetado Anillo Mitral / Tricúspide</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 p-8 font-sans">

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-lg">
        <h1 class="text-3xl font-bold mb-6 text-blue-600">🫀 Herramienta de Etiquetado Médico</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="space-y-6">
                
                <div class="p-4 border rounded bg-blue-50 border-blue-200">
                    <label class="block font-semibold mb-1 text-blue-800">Carpeta / Video Actual:</label>
                    <div id="videoNameDisplay" class="text-xl font-bold text-blue-600 mb-4">Cargando Drive...</div>
                    <button onclick="nextVideoFolder()" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded font-semibold shadow transition duration-200">
                        Cargar Siguiente Video ⏭️
                    </button>
                </div>

                <div class="p-4 border rounded bg-gray-50">
                    <label class="block font-semibold mb-2">Tipo de Válvula</label>
                    <div class="flex gap-4">
                        <label class="cursor-pointer"><input type="radio" name="valve" value="Mitral" checked> Mitral (Rojo)</label>
                        <label class="cursor-pointer"><input type="radio" name="valve" value="Tricúspide"> Tricúspide (Azul)</label>
                    </div>
                </div>

                <div class="p-4 border rounded bg-gray-50">
                    <label class="block font-semibold mb-2">Acciones</label>
                    <button onclick="deleteCurrentFramePoints()" class="w-full bg-red-500 hover:bg-red-600 text-white py-2 rounded mb-3 shadow transition duration-200">
                        Borrar Puntos de este Frame
                    </button>
                    <button onclick="saveVideoCSV()" class="w-full bg-green-500 hover:bg-green-600 text-white py-2 rounded font-semibold shadow transition duration-200">
                        Guardar CSV del Video 💾
                    </button>
                </div>
            </div>

            <div class="md:col-span-2">
                <div class="mb-4 flex items-center justify-between">
                    <span class="font-semibold">Frame Actual: <span id="frameCounter">0</span> / <span id="totalFrames">0</span></span>
                    <div>
                        <button onclick="prevFrame()" class="bg-gray-300 hover:bg-gray-400 px-4 py-1 rounded shadow-sm">- Ant</button>
                        <button onclick="nextFrame()" class="bg-gray-300 hover:bg-gray-400 px-4 py-1 rounded shadow-sm">Sig +</button>
                    </div>
                </div>
                
                <input type="range" id="frameSlider" min="0" max="0" value="0" class="w-full mb-4 cursor-pointer" oninput="slideFrame(this.value)">

                <div class="border-2 border-dashed border-gray-400 rounded flex justify-center bg-black overflow-hidden" style="min-height: 400px;">
                    <canvas id="videoCanvas" class="cursor-crosshair max-w-full"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ESTADOS DE LA APLICACIÓN
        let folders = [];
        let currentFolderIdx = 0;
        let frames = [];
        let currentFrameIdx = 0;
        let points = []; 
        let currentVideoName = "";
        
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d');
        let currentImage = new Image();

        // 1. OBTENER CARPETAS AL CARGAR LA PÁGINA
        window.onload = async function() {
            try {
                const response = await fetch('/api/get_folders');
                const data = await response.json();
                
                if (data.folders && data.folders.length > 0) {
                    folders = data.folders;
                    currentFolderIdx = 0;
                    loadVideoData(folders[currentFolderIdx]);
                } else {
                    document.getElementById('videoNameDisplay').innerText = "Carpeta vacía";
                    alert("No se encontraron subcarpetas en tu Drive.");
                }
            } catch (error) {
                console.error(error);
                alert("Error al conectar con Google Drive.");
            }
        };

        // 2. DESCARGAR Y CARGAR LAS IMÁGENES DEL VIDEO SELECCIONADO
        async function loadVideoData(folder) {
            document.getElementById('videoNameDisplay').innerText = "Descargando " + folder.name + "...";
            
            try {
                const response = await fetch('/api/load_video', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ folder_id: folder.id, folder_name: folder.name })
                });
                const data = await response.json();
                
                if (data.error) return alert(data.error);

                frames = data.frames;
                currentVideoName = data.video_name;
                currentFrameIdx = 0;
                points = []; // Limpiamos los puntos para el nuevo video

                // Actualizar interfaz
                document.getElementById('videoNameDisplay').innerText = currentVideoName;
                document.getElementById('totalFrames').innerText = frames.length > 0 ? frames.length - 1 : 0;
                document.getElementById('frameSlider').max = frames.length > 0 ? frames.length - 1 : 0;
                
                if(frames.length > 0) {
                    loadFrame();
                } else {
                    alert("No se encontraron imágenes en esta carpeta.");
                }
            } catch (error) {
                console.error(error);
                alert("Error al descargar los frames.");
            }
        }

        // 3. NAVEGAR AL SIGUIENTE VIDEO
        function nextVideoFolder() {
            if (currentFolderIdx < folders.length - 1) {
                currentFolderIdx++;
                loadVideoData(folders[currentFolderIdx]);
            } else {
                alert("¡Felicidades! Has terminado de etiquetar todos los videos de la carpeta principal.");
            }
        }

        // ==========================================
        // LÓGICA DE DIBUJO Y NAVEGACIÓN DE FRAMES
        // ==========================================
        
        function loadFrame() {
            if (frames.length === 0) return;
            
            currentImage.src = frames[currentFrameIdx];
            currentImage.onload = () => {
                canvas.width = currentImage.width;
                canvas.height = currentImage.height;
                drawCanvas();
            };
            
            document.getElementById('frameCounter').innerText = currentFrameIdx;
            document.getElementById('frameSlider').value = currentFrameIdx;
        }

        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(currentImage, 0, 0);

            // DIBUJAR LAS CRUZES
            points.forEach(p => {
                if (p.Frame === currentFrameIdx) {
                    const size = 10; // Tamaño de la cruz
                    ctx.beginPath();
                    ctx.moveTo(p.X - size, p.Y);
                    ctx.lineTo(p.X + size, p.Y);
                    ctx.moveTo(p.X, p.Y - size);
                    ctx.lineTo(p.X, p.Y + size);
                    
                    ctx.strokeStyle = p.Valve === 'Mitral' ? '#ff2222' : '#2222ff';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            });
        }

        canvas.addEventListener('mousedown', function(event) {
            if (frames.length === 0) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const x = Math.round((event.clientX - rect.left) * scaleX);
            const y = Math.round((event.clientY - rect.top) * scaleY);
            
            const valveType = document.querySelector('input[name="valve"]:checked').value;

            // Evitar duplicados de la misma válvula en el mismo frame
            points = points.filter(p => !(p.Frame === currentFrameIdx && p.Valve === valveType));

            points.push({
                Video: currentVideoName,
                Frame: currentFrameIdx,
                X: x,
                Y: y,
                Valve: valveType
            });

            drawCanvas();
        });

        function nextFrame() { if (currentFrameIdx < frames.length - 1) { currentFrameIdx++; loadFrame(); } }
        function prevFrame() { if (currentFrameIdx > 0) { currentFrameIdx--; loadFrame(); } }
        function slideFrame(val) { currentFrameIdx = parseInt(val); loadFrame(); }
        
        function deleteCurrentFramePoints() {
            points = points.filter(p => p.Frame !== currentFrameIdx);
            drawCanvas();
        }

        // ==========================================
        // GUARDAR CSV
        // ==========================================
        async function saveVideoCSV() {
            if (points.length === 0) return alert("No hay puntos marcados para guardar.");

            const response = await fetch('/save_csv', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ points: points, video_name: currentVideoName })
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `${currentVideoName}_etiquetas.csv`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
            } else {
                alert("Error al generar el CSV.");
            }
        }
    </script>
</body>
</html>
